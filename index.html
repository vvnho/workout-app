  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA: restore route from 404 redirect -->
    <script>
      (function () {
        var q = new URLSearchParams(window.location.search);
        var p = q.get('p');
        if (p) {
          var restored = p + (q.get('q') ? '?' + q.get('q') : '') + window.location.hash;
          window.history.replaceState(null, '', '/workout-app' + restored);
        }
      })();
    </script>
  </body>
