<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#00BCD4"/>
  <!-- WbTwilight / sunrise icon - white on teal -->
  <g transform="translate(256,286) scale(9)" fill="white">
    <!-- Sun arc -->
    <path d="M0,-11a11,11 0 0,1 11,11h-3a8,8 0 0,0-16,0h-3a11,11 0 0,1 11,-11z"/>
    <!-- Horizon line -->
    <rect x="-14" y="2" width="28" height="2.5" rx="1.25"/>
    <!-- Sun rays -->
    <rect x="-1.25" y="-18" width="2.5" height="5" rx="1.25"/>
    <rect x="-1.25" y="-18" width="2.5" height="5" rx="1.25" transform="rotate(45)"/>
    <rect x="-1.25" y="-18" width="2.5" height="5" rx="1.25" transform="rotate(-45)"/>
    <rect x="-1.25" y="-18" width="2.5" height="5" rx="1.25" transform="rotate(90)"/>
    <rect x="-1.25" y="-18" width="2.5" height="5" rx="1.25" transform="rotate(-90)"/>
  </g>
</svg>
